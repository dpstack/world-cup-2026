<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/world-cup-2026/logo.png" />
    <title>World Cup 2026</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        padding: 0;
        /* The polyfill injects "Twemoji Country Flags" automatically, so we list it first after Outfit */
        font-family: 'Outfit', 'Twemoji Country Flags', 'Segoe UI', 'Segoe UI Emoji', sans-serif;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #080e14; }
      ::-webkit-scrollbar-thumb { background: rgba(240, 192, 64, 0.3); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(240, 192, 64, 0.6); }

      .grid-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .grid-2col-gap24 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      .grid-cond {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .grid-cond-1 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .tabs-container {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 4px 20px 22px;
        flex-wrap: wrap;
      }
      .bracket-container {
        display: flex;
        overflow-x: auto;
        gap: 40px;
        padding: 20px 0 60px;
        align-items: center; 
      }
      .bracket-column {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        gap: 20px;
        min-width: 300px;
      }
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
      .pulse-anim { animation: pulse 2s infinite; }

      @media (max-width: 768px) {
        .grid-2col, .grid-2col-gap24, .grid-cond {
          grid-template-columns: 1fr;
        }
        .tabs-container {
          flex-wrap: nowrap;
          justify-content: flex-start;
          overflow-x: auto;
          padding-bottom: 22px;
          -webkit-overflow-scrolling: touch;
        }
        .tabs-container::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
    <script type="module" crossorigin src="/world-cup-2026/assets/index-DJhodbyk.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
